<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IT Degree Week Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet" />
  <style>
    /* Reset & base */
    body,
    html {
      margin: 0;
      height: 100%;
      background: #0d1117;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      position: relative;
      color: #58a6ff;
    }

    /* Widget container */
    .widget {
      position: relative;
      z-index: 1;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
      color: #39FF14;
      max-width: 350px;
      margin: 40px auto;
      padding: 20px 30px;
      border-radius: 12px;
      border: 1px solid #238636;
      box-shadow: 0 0 8px #58a6ff88, inset 0 0 6px #23863666;
      font-size: 18px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 1.5px;
      min-width: 320px;
      display: flex;
      justify-content: center;
      gap: 12px;
      align-items: center;
      user-select: none;
      box-shadow:
        0 0 10px #39FF14cc,
        inset 0 0 15px #39FF1477;
      gap: 20px;
    }

    .week-box {
      font-weight: 700;
      font-size: 24px;
      letter-spacing: 2px;
      padding-right: 12px;
      border-right: 2px solid #238636;
      position: relative;
    }

    /* Blinking cursor */
    .week-box::after {
      position: absolute;
      right: 6px;
      top: 0;
      bottom: 0;
      color: #238636;
      animation: blink 1.2s infinite step-end;
    }

    @keyframes blink {

      0%,
      50% {
        opacity: 1;
      }

      50.01%,
      100% {
        opacity: 0;
      }
    }

    .date-display {
      background-color: #238636;
      color: #cdd9e5;
      padding: 10px 20px;
      border-radius: 6px;
      border: 2px solid #39FF14;
      box-shadow: 0 4px 6px rgba(57, 255, 20, 0.5);
      font-weight: 600;
      font-size: 18px;
      font-family: monospace;
      letter-spacing: 1.2px;
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
    }
  </style>
</head>

<body>

  <div class="widget">
    <div class="week-box" id="weekDisplay"></div>
    <div class="date-display" id="dateRange"></div>
  </div>

  <script>
    // === Week & Date display code ===
    const startDate = new Date('2025-07-21');
    const today = new Date();

    const msInDay = 1000 * 60 * 60 * 24;
    const diffDays = Math.floor((today - startDate) / msInDay);
    const weekNum = diffDays < 0 ? 1 : Math.floor(diffDays / 7) + 1;

    const thisWeekStart = new Date(startDate);
    thisWeekStart.setDate(startDate.getDate() + (weekNum - 1) * 7);
    const thisWeekEnd = new Date(thisWeekStart);
    thisWeekEnd.setDate(thisWeekStart.getDate() + 6);

    const formatDate = (date) =>
      date.toLocaleDateString('en-GB', {
        day: 'numeric',
        month: 'short',
      }).toUpperCase();

    // Set week and date text
    document.getElementById('weekDisplay').textContent = `WEEK ${weekNum}`;
    document.getElementById('dateRange').textContent = `${formatDate(thisWeekStart)} – ${formatDate(thisWeekEnd)}`;

  </script>
</body>

</html>
