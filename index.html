<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IT Degree Week Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet" />
  <style>
    /* Reset & base */
    body,
    html {
      margin: 0;
      height: 100%;
      background: #0d1117;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      position: relative;
      color: #58a6ff;
    }

        /* Outer box container to hold the widget */
    .widget-container {
      max-width: 320px;
      margin: 40px auto;
      background: #e0e0e0; /* Light box background */
      border-radius: 16px;
      padding: 20px 25px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      display: flex;
      justify-content: center;
    }
    
    /* Widget itself: transparent background */
    .widget {
      background: transparent;
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: 'Poppins', sans-serif;
      user-select: none;
    }
    
    /* Week text: black and bold */
    .week-box {
      font-weight: 700;
      font-size: 24px;
      color: #000000;
      letter-spacing: 1.2px;
    }
    
    /* Date range text: softer gray */
    .date-display {
      font-weight: 500;
      font-size: 18px;
      color: #555555;
      font-family: 'Poppins', sans-serif;
    }

  </style>
</head>

<body>

  <div class="widget-container">
  <div class="widget">
    <div class="week-box" id="weekDisplay"></div>
    <div class="date-display" id="dateRange"></div>
  </div>
</div>

  <script>
    // === Week & Date display code ===
    const startDate = new Date('2025-07-21');
    const today = new Date();

    const msInDay = 1000 * 60 * 60 * 24;
    const diffDays = Math.floor((today - startDate) / msInDay);
    const weekNum = diffDays < 0 ? 1 : Math.floor(diffDays / 7) + 1;

    const thisWeekStart = new Date(startDate);
    thisWeekStart.setDate(startDate.getDate() + (weekNum - 1) * 7);
    const thisWeekEnd = new Date(thisWeekStart);
    thisWeekEnd.setDate(thisWeekStart.getDate() + 6);

    const formatDate = (date) =>
      date.toLocaleDateString('en-GB', {
        day: 'numeric',
        month: 'short',
      }).toUpperCase();

    // Set week and date text
    document.getElementById('weekDisplay').textContent = `WEEK ${weekNum}`;
    document.getElementById('dateRange').textContent = `${formatDate(thisWeekStart)} – ${formatDate(thisWeekEnd)}`;

  </script>
</body>

</html>
