<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IT Degree Week Widget - Notion Embed</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet" />
  <style>
    /* Reset unwanted margins/padding */
    body, .widget-container, .widget {
      margin: 0;
      padding: 0;
    }

    /* Make page background transparent for Notion embed */
    body, html {
      background: transparent;
      height: auto;
      font-family: 'Poppins', sans-serif;
      color: #000000;
    }

    /* Outer container: light box */
    .widget-container {
      max-width: 180px;  /* slightly less than 186 to avoid scrollbars */
      height: 100px;
      margin: 0 auto;
      background: #e0e0e0;
      border-radius: 12px;
      padding: 8px 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      display: inline-flex;
      justify-content: center;
      align-items: center;
      overflow: hidden; /* ensure no overflow */
    }


    /* Widget itself transparent and horizontal layout */
    .widget {
      font-size: 14px;
      gap: 8px;
      color: #000;
      user-select: none;
    }

    /* Week number styling */
    .week-box {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* Date range styling */
    .date-display {
      font-size: 13px;
      color: #555;
    }  
  </style>
</head>

<body>
  <div class="widget-container">
    <div class="widget">
      <div class="week-box" id="weekDisplay"></div>
      <div class="date-display" id="dateRange"></div>
    </div>
  </div>

  <script>
    // Calculate current week number since start date
    const startDate = new Date('2025-07-21');
    const today = new Date();

    const msInDay = 1000 * 60 * 60 * 24;
    const diffDays = Math.floor((today - startDate) / msInDay);
    const weekNum = diffDays < 0 ? 1 : Math.floor(diffDays / 7) + 1;

    const thisWeekStart = new Date(startDate);
    thisWeekStart.setDate(startDate.getDate() + (weekNum - 1) * 7);
    const thisWeekEnd = new Date(thisWeekStart);
    thisWeekEnd.setDate(thisWeekStart.getDate() + 6);

    const formatDate = (date) =>
      date.toLocaleDateString('en-GB', {
        day: 'numeric',
        month: 'short',
      }).toUpperCase();

    // Set the text content in the widget
    document.getElementById('weekDisplay').textContent = `WEEK ${weekNum}`;
    document.getElementById('dateRange').textContent = `${formatDate(thisWeekStart)} – ${formatDate(thisWeekEnd)}`;
  </script>
</body>

</html>
