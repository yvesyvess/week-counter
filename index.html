<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IT Degree Week Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet" />
  <style>
    /* Reset & base */
    body,
    html {
      margin: 0;
      height: 100%;
      background: #0d1117;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      position: relative;
      color: #58a6ff;
    }

    /* Widget container */
    .widget {
      background: rgba(36, 41, 46, 0.8);
      backdrop-filter: blur(6px);
      color: #39FF14;
      max-width: 240px;
      margin: 20px auto;
      padding: 12px 18px;
      border-radius: 8px;
      border: 1px solid #238636;
      font-size: 14px;
      letter-spacing: 1px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      box-shadow: none;
    }
    .week-box {
      font-weight: 700;
      font-size: 24px;
      letter-spacing: 2px;
      padding-right: 12px;
      border-right: 2px solid #238636;
      position: relative;
    }

    /* Blinking cursor */
    .week-box {
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 1px;
      padding: 0;
      border: none;
      position: relative;
  }

    @keyframes blink {

      0%,
      50% {
        opacity: 1;
      }

      50.01%,
      100% {
        opacity: 0;
      }
    }

      .date-display {
        background-color: transparent;
        color: #cdd9e5;
        padding: 4px 10px;
        border-radius: 4px;
        border: 1px solid #58a6ff;
        font-size: 13px;
    }  
  </style>
</head>

<body>

  <div class="widget">
    <div class="week-box" id="weekDisplay"></div>
    <div class="date-display" id="dateRange"></div>
  </div>

  <script>
    // === Week & Date display code ===
    const startDate = new Date('2025-07-21');
    const today = new Date();

    const msInDay = 1000 * 60 * 60 * 24;
    const diffDays = Math.floor((today - startDate) / msInDay);
    const weekNum = diffDays < 0 ? 1 : Math.floor(diffDays / 7) + 1;

    const thisWeekStart = new Date(startDate);
    thisWeekStart.setDate(startDate.getDate() + (weekNum - 1) * 7);
    const thisWeekEnd = new Date(thisWeekStart);
    thisWeekEnd.setDate(thisWeekStart.getDate() + 6);

    const formatDate = (date) =>
      date.toLocaleDateString('en-GB', {
        day: 'numeric',
        month: 'short',
      }).toUpperCase();

    // Set week and date text
    document.getElementById('weekDisplay').textContent = `WEEK ${weekNum}`;
    document.getElementById('dateRange').textContent = `${formatDate(thisWeekStart)} – ${formatDate(thisWeekEnd)}`;

  </script>
</body>

</html>
